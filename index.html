<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ablo Studio -- Signup Launch Dashboard</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0e0e0e;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .tabs { display: flex; gap: 0; background: #1a1a1a; padding: 6px 16px 0;
             overflow-x: auto; border-bottom: 1px solid #2a2a2a; }
    .tab { background: transparent; border: 0; padding: 10px 14px;
            cursor: pointer; color: #8a8a8a; font-size: 13px;
            border-bottom: 2px solid transparent; font-family: inherit;
            white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: #4af; }
    .tab:hover { color: #ddd; }
    .meta { color: #777; padding: 4px 16px; font-size: 11px;
             background: #0e0e0e; border-bottom: 1px solid #1f1f1f; }
    iframe { width: 100%; height: calc(100vh - 64px); border: 0; background: #fff; display: block; }
  </style>
</head>
<body>
  <nav class="tabs" id="tabs"><button class="tab active" data-day="2026-05-27">Today</button><button class="tab" data-day="2026-05-26">2026-05-26</button><button class="tab" data-day="2026-05-22">2026-05-22</button></nav>
  <div class="meta">Each tab is a daily snapshot. Today refreshes every 12h with the autopilot cycle.</div>
  <iframe id="view" src="history/2026-05-27.html"></iframe>
  <script>
    const tabs = document.getElementById('tabs');
    const view = document.getElementById('view');
    tabs.addEventListener('click', (e) => {
      const day = e.target.dataset && e.target.dataset.day;
      if (!day) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      view.src = 'history/' + day + '.html';
    });
  </script>
</body>
</html>
